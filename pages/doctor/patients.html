<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patients — FUD Health HMS</title>
<link rel="stylesheet" href="/assets/css/variables.css?v2">
<link rel="stylesheet" href="/assets/css/base.css?v2">
<link rel="stylesheet" href="/assets/css/components.css?v2">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style> .search-bar { max-width: 360px; margin-bottom: var(--space-5); } </style>
</head>
<body data-role="doctor">

<div class="app-shell" id="appShellRoot">
  <div style="padding:32px;"><div class="skeleton skeleton-title" style="width:200px;"></div></div>
</div>

<template id="pageContent">
  <h3 style="margin-bottom: var(--space-4);">Patients</h3>
  <div class="input-wrap search-bar">
    <i class="icon" data-lucide="search" style="width:20px;height:20px;"></i>
    <input class="input has-icon" id="searchInput" placeholder="Search by name or reg. number…">
  </div>
  <div class="card">
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Reg. Number</th><th>Name</th><th>Faculty / Dept.</th><th>Email</th><th></th></tr></thead>
        <tbody id="patientsTbody"><tr><td colspan="5"><div class="skeleton skeleton-text"></div></td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<script type="module">
  import { initLayout } from "/components/layout.js?v2";
  import { listPatients, searchPatients } from "/assets/js/api/patients.js?v2";
  import { listAppointmentsForPatient } from "/assets/js/api/appointments.js?v2";
  import { listRecordsForPatient, addMedicalRecord } from "/assets/js/api/medicalRecords.js?v2";
  import { listPrescriptionsForPatient } from "/assets/js/api/prescriptions.js?v2";
  import { openModal, closeModal } from "/components/modal.js?v2";
  import { showToast } from "/assets/js/toast.js?v2";
  import { icon } from "/components/icons.js?v2";

  const profile = await initLayout({ role: "doctor", active: "patients", title: "Patients" });
  let debounceTimer;

  if (profile) {
    render(await safeList());
    document.getElementById("searchInput").addEventListener("input", (e) => {
      clearTimeout(debounceTimer);
      const q = e.target.value;
      debounceTimer = setTimeout(async () => render(await safeSearch(q)), 300);
    });
  }

  async function safeList() { try { return await listPatients(); } catch (err) { showToast(err.message, "error"); return []; } }
  async function safeSearch(q) { try { return await searchPatients(q); } catch (err) { showToast(err.message, "error"); return []; } }

  function render(patients) {
    const tbody = document.getElementById("patientsTbody");
    if (!patients.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">${icon("patients",40)}<p>No patients found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = patients.map(p => `
      <tr>
        <td>${p.reg_number}</td>
        <td>${p.profiles?.full_name || "—"}</td>
        <td>${p.faculty || "—"} / ${p.department || "—"}</td>
        <td>${p.profiles?.email || "—"}</td>
        <td><button class="btn btn-secondary btn-sm view-btn" data-id="${p.id}" data-name="${p.profiles?.full_name || ""}">View</button></td>
      </tr>
    `).join("");
    tbody.querySelectorAll(".view-btn").forEach(btn => btn.addEventListener("click", () => openPatientDetail(btn.dataset.id, btn.dataset.name)));
  }

  async function openPatientDetail(patientId, patientName) {
    openModal(`
      <h3>${patientName}</h3>
      <div id="detailBody" style="margin-top: var(--space-3);"><div class="skeleton skeleton-text"></div></div>
      <h4 style="margin: var(--space-5) 0 var(--space-2);">Add diagnosis / note</h4>
      <form id="recordForm">
        <div class="field"><label>Diagnosis</label><input class="input" id="diagnosis" placeholder="e.g. Malaria" required></div>
        <div class="field"><label>Notes</label><textarea class="input" id="recordNotes" placeholder="Clinical notes…"></textarea></div>
        <button type="submit" class="btn btn-role btn-block" id="saveRecordBtn">Save to medical record</button>
      </form>
    `);

    try {
      const [appts, records, rx] = await Promise.all([
        listAppointmentsForPatient(patientId),
        listRecordsForPatient(patientId),
        listPrescriptionsForPatient(patientId),
      ]);
      document.getElementById("detailBody").innerHTML = `
        <h4 style="margin-bottom: var(--space-2);">Appointments (${appts.length})</h4>
        ${appts.slice(0,4).map(a => `<div style="font-size: var(--fs-sm); padding: 6px 0; border-bottom:1px solid var(--color-gray-100);">${new Date(a.scheduled_at).toLocaleString()} <span class="badge badge-info">${a.status}</span></div>`).join("") || "<p class='text-muted'>None yet.</p>"}
        <h4 style="margin: var(--space-4) 0 var(--space-2);">Medical records (${records.length})</h4>
        ${records.slice(0,4).map(r => `<div style="font-size: var(--fs-sm); padding: 6px 0; border-bottom:1px solid var(--color-gray-100);"><strong>${r.diagnosis || "—"}</strong><br>${r.notes || ""}</div>`).join("") || "<p class='text-muted'>None yet.</p>"}
        <h4 style="margin: var(--space-4) 0 var(--space-2);">Prescriptions (${rx.length})</h4>
        ${rx.slice(0,4).map(p => `<div style="font-size: var(--fs-sm); padding: 6px 0; border-bottom:1px solid var(--color-gray-100);">${p.medication} — ${p.dosage} <span class="badge badge-neutral">${p.status}</span></div>`).join("") || "<p class='text-muted'>None yet.</p>"}
      `;
    } catch (err) {
      document.getElementById("detailBody").innerHTML = `<p class="text-muted">Could not load: ${err.message}</p>`;
    }

    document.getElementById("recordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("saveRecordBtn");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        await addMedicalRecord({
          patientId, doctorId: profile.id,
          diagnosis: document.getElementById("diagnosis").value.trim(),
          notes: document.getElementById("recordNotes").value.trim(),
        });
        showToast("Medical record saved.", "success");
        closeModal();
      } catch (err) {
        showToast(err.message || "Could not save record.", "error");
        btn.disabled = false; btn.textContent = "Save to medical record";
      }
    });
  }
</script>
</body>
</html>
