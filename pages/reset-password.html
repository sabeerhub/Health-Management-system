<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password — FUD Health HMS</title>
<link rel="stylesheet" href="/assets/css/variables.css?v2">
<link rel="stylesheet" href="/assets/css/base.css?v2">
<link rel="stylesheet" href="/assets/css/components.css?v2">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-5); background: radial-gradient(60% 50% at 50% 0%, rgba(37,99,235,0.08), transparent 70%), var(--color-bg); }
  .auth-card { max-width: 440px; width: 100%; background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: var(--space-7) var(--space-6); }
  .auth-card h1 { font-size: var(--fs-xl); margin-bottom: var(--space-2); }
  .auth-card .subtitle { color: var(--color-gray-500); margin-bottom: var(--space-6); }
</style>
</head>
<body>

<div class="auth-card">
  <h1>Set a new password</h1>
  <p class="subtitle" id="subtitle">Verifying your reset link…</p>

  <form id="resetForm" style="display:none;">
    <div class="field">
      <label for="newPassword">New password</label>
      <div class="input-wrap">
        <i class="icon" data-lucide="lock" style="width:20px;height:20px;"></i>
        <input class="input has-icon" type="password" id="newPassword" minlength="8" placeholder="At least 8 characters" required>
      </div>
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm new password</label>
      <input class="input" type="password" id="confirmPassword" placeholder="Re-enter password" required>
      <span class="field-hint" id="confirmHint"></span>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Update password</button>
  </form>

  <div id="invalidState" style="display:none;">
    <p style="color: var(--color-gray-500); font-size: var(--fs-sm);">
      This reset link is invalid or has expired. Request a new one from your sign-in page.
    </p>
  </div>
</div>

<script type="module">
  import "/components/icons.js"; // wires up Lucide auto-render
  import { supabase } from "/assets/js/supabaseClient.js?v2";
  import { completePasswordReset } from "/assets/js/auth.js?v2";
  import { showToast } from "/assets/js/toast.js?v2";

  const subtitle = document.getElementById("subtitle");
  const form = document.getElementById("resetForm");
  const invalidState = document.getElementById("invalidState");

  // supabaseClient.js sets detectSessionInUrl: true, so Supabase has
  // already parsed the recovery token from the URL by the time this runs.
  // We just need to confirm a session actually exists before showing the form.
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    subtitle.textContent = "Choose a new password for your account.";
    form.style.display = "block";
  } else {
    subtitle.style.display = "none";
    invalidState.style.display = "block";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const hint = document.getElementById("confirmHint");

    if (pw.length < 8) { showToast("Password must be at least 8 characters.", "error"); return; }
    if (pw !== confirm) { hint.textContent = "Passwords do not match"; hint.classList.add("error"); return; }
    hint.textContent = "";

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Updating…";
    try {
      await completePasswordReset(pw);
      await supabase.auth.signOut(); // force a fresh sign-in with the new password
      showToast("Password updated. Please sign in again.", "success", 5000);
      setTimeout(() => { window.location.href = "/pages/login.html"; }, 1500);
    } catch (err) {
      showToast(err.message || "Could not update password.", "error");
      btn.disabled = false;
      btn.textContent = "Update password";
    }
  });
</script>
</body>
</html>
