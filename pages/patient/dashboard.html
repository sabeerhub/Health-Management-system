<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — FUD Health HMS</title>
<link rel="stylesheet" href="/assets/css/variables.css?v2">
<link rel="stylesheet" href="/assets/css/base.css?v2">
<link rel="stylesheet" href="/assets/css/components.css?v2">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  .welcome-banner {
    background: linear-gradient(135deg, var(--color-primary) 0%, #1E3A8A 100%);
    color: #fff; border-radius: var(--radius-lg); padding: var(--space-6);
    margin-bottom: var(--space-6);
  }
  .welcome-banner h2 { color: #fff; margin-bottom: var(--space-2); }
  .welcome-banner p { color: rgba(255,255,255,0.85); }
</style>
</head>
<body data-role="patient">

<div class="app-shell" id="appShellRoot">
  <div style="padding:32px;"><div class="skeleton skeleton-title" style="width:220px;"></div></div>
</div>

<template id="pageContent">
  <div class="welcome-banner" id="welcomeBanner">
    <div class="skeleton skeleton-title" style="background:rgba(255,255,255,0.3); width:240px;"></div>
  </div>

  <div class="grid-3" id="cardsGrid">
    <div class="card"><div class="skeleton skeleton-card"></div></div>
    <div class="card"><div class="skeleton skeleton-card"></div></div>
    <div class="card"><div class="skeleton skeleton-card"></div></div>
  </div>
</template>

<script type="module">
  import { initLayout } from "/components/layout.js?v2";
  import { getPatientStats } from "/assets/js/api/stats.js?v2";
  import { icon } from "/components/icons.js?v2";
  import { showToast } from "/assets/js/toast.js?v2";

  const profile = await initLayout({ role: "patient", active: "dashboard", title: "Dashboard" });
  if (profile) {
    document.getElementById("welcomeBanner").innerHTML = `
      <h2>Welcome back, ${profile.full_name.split(" ")[0]} 👋</h2>
      <p>Here's a snapshot of your health activity today.</p>
    `;

    try {
      const stats = await getPatientStats(profile.id);
      const next = stats.nextAppointment;
      const payment = stats.lastPayment;

      document.getElementById("cardsGrid").innerHTML = `
        <div class="card">
          <h4 style="margin-bottom: var(--space-3);">${icon("appointments",18)} Upcoming appointment</h4>
          ${next ? `
            <div class="stat-value" style="font-size: var(--fs-md);">${new Date(next.scheduled_at).toLocaleString()}</div>
            <p class="text-muted" style="font-size: var(--fs-sm); margin-top: 4px;">Dr. ${next.doctors?.profiles?.full_name || "Unassigned"} ${next.doctors?.specialty ? "— " + next.doctors.specialty : ""}</p>
            <a href="/pages/patient/book-appointment.html" class="btn btn-secondary btn-sm" style="margin-top: var(--space-3);">Manage</a>
          ` : `<p class="text-muted">No upcoming appointment.</p><a href="/pages/patient/book-appointment.html" class="btn btn-role btn-sm" style="margin-top: var(--space-3);">Book one</a>`}
        </div>

        <div class="card">
          <h4 style="margin-bottom: var(--space-3);">${icon("payments",18)} Payment summary</h4>
          ${payment ? `
            <div class="stat-value" style="font-size: var(--fs-md);">₦${Number(payment.amount).toLocaleString()}</div>
            <span class="badge ${payment.status === "success" ? "badge-success" : payment.status === "pending" ? "badge-warning" : "badge-danger"}" style="margin-top: 6px;">${payment.status}</span>
          ` : `<p class="text-muted">No payments yet.</p>`}
          <a href="/pages/patient/payments.html" class="btn btn-secondary btn-sm" style="margin-top: var(--space-3);">View payments</a>
        </div>

        <div class="card">
          <h4 style="margin-bottom: var(--space-3);">${icon("prescription",18)} Prescription summary</h4>
          <div class="stat-value">${stats.activePrescriptions}</div>
          <p class="text-muted" style="font-size: var(--fs-sm);">Active prescription${stats.activePrescriptions === 1 ? "" : "s"}</p>
          <a href="/pages/patient/prescriptions.html" class="btn btn-secondary btn-sm" style="margin-top: var(--space-3);">View prescriptions</a>
        </div>
      `;
    } catch (err) {
      showToast(err.message, "error");
    }
  }
</script>
</body>
</html>
