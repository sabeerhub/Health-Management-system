<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptions — FUD Health HMS</title>
<link rel="stylesheet" href="/assets/css/variables.css?v2">
<link rel="stylesheet" href="/assets/css/base.css?v2">
<link rel="stylesheet" href="/assets/css/components.css?v2">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body data-role="patient">

<div class="app-shell" id="appShellRoot">
  <div style="padding:32px;"><div class="skeleton skeleton-title" style="width:200px;"></div></div>
</div>

<template id="pageContent">
  <h3 style="margin-bottom: var(--space-4);">My prescriptions</h3>
  <div class="card">
    <div id="rxList"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
  </div>
</template>

<script type="module">
  import { initLayout } from "/components/layout.js?v2";
  import { listPrescriptionsForPatient } from "/assets/js/api/prescriptions.js?v2";
  import { showToast } from "/assets/js/toast.js?v2";
  import { icon } from "/components/icons.js?v2";

  const profile = await initLayout({ role: "patient", active: "prescriptions", title: "Prescriptions" });
  if (profile) {
    const list = document.getElementById("rxList");
    try {
      const rx = await listPrescriptionsForPatient(profile.id);
      if (!rx.length) {
        list.innerHTML = `<div class="empty-state">${icon("prescription",40)}<p>No prescriptions yet.</p></div>`;
      } else {
        list.innerHTML = rx.map(r => `
          <div style="padding: var(--space-4) 0; border-bottom: 1px solid var(--color-gray-100); display:flex; justify-content:space-between; align-items:flex-start; gap: var(--space-3);">
            <div>
              <div style="font-weight:600;">${r.medication}</div>
              <div class="text-muted" style="font-size: var(--fs-sm); margin-top: 2px;">${r.dosage} · ${r.duration}</div>
              <div class="text-muted" style="font-size: var(--fs-xs); margin-top: 4px;">Prescribed by Dr. ${r.doctors?.profiles?.full_name || "—"} on ${new Date(r.created_at).toLocaleDateString()}</div>
              ${r.notes ? `<p style="font-size: var(--fs-sm); margin-top: 6px;">${r.notes}</p>` : ""}
            </div>
            <span class="badge ${r.status === "dispensed" ? "badge-success" : r.status === "cancelled" ? "badge-danger" : "badge-warning"}">${r.status}</span>
          </div>
        `).join("");
      }
    } catch (err) {
      showToast(err.message || "Could not load prescriptions.", "error");
    }
  }
</script>
</body>
</html>
