<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments — FUD Health HMS</title>
<link rel="stylesheet" href="/assets/css/variables.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body data-role="patient">

<div class="app-shell" id="appShellRoot">
  <div style="padding:32px;"><div class="skeleton skeleton-title" style="width:200px;"></div></div>
</div>

<template id="pageContent">
  <div class="grid-2" style="align-items:start;">
    <div class="card">
      <h3 style="margin-bottom: var(--space-4);">Book an appointment</h3>
      <form id="bookForm">
        <div class="field">
          <label>Doctor</label>
          <select class="input" id="doctorSelect">
            <option value="">No preference — any available doctor</option>
          </select>
        </div>
        <div class="field"><label>Preferred date &amp; time</label><input class="input" type="datetime-local" id="scheduledAt" required></div>
        <div class="field"><label>Reason for visit</label><textarea class="input" id="reason" placeholder="Briefly describe your symptoms or reason…" required></textarea></div>
        <button type="submit" class="btn btn-role btn-block" id="bookBtn">Request appointment</button>
      </form>
    </div>

    <div class="card">
      <h3 style="margin-bottom: var(--space-4);">My appointments</h3>
      <div id="apptList"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
    </div>
  </div>
</template>

<script type="module">
  import { initLayout } from "/components/layout.js";
  import { bookAppointment, listAppointmentsForPatient, cancelAppointment, listBookableDoctors } from "/assets/js/api/appointments.js";
  import { confirmAction } from "/components/modal.js";
  import { showToast } from "/assets/js/toast.js";
  import { icon } from "/components/icons.js";

  const profile = await initLayout({ role: "patient", active: "book", title: "Appointments" });
  if (profile) {
    await populateDoctors();
    await loadAppointments();

    document.getElementById("bookForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("bookBtn");
      btn.disabled = true; btn.textContent = "Requesting…";
      try {
        await bookAppointment({
          patientId: profile.id,
          doctorId: document.getElementById("doctorSelect").value || null,
          scheduledAt: document.getElementById("scheduledAt").value,
          reason: document.getElementById("reason").value.trim(),
        });
        showToast("Appointment requested. Awaiting approval.", "success");
        document.getElementById("bookForm").reset();
        await loadAppointments();
      } catch (err) {
        showToast(err.message || "Could not book appointment.", "error");
      } finally {
        btn.disabled = false; btn.textContent = "Request appointment";
      }
    });
  }

  async function populateDoctors() {
    try {
      const doctors = await listBookableDoctors();
      const select = document.getElementById("doctorSelect");
      select.innerHTML = `<option value="">No preference — any available doctor</option>` +
        doctors.map(d => `<option value="${d.id}">Dr. ${d.profiles?.full_name || "—"}${d.specialty ? " — " + d.specialty : ""}</option>`).join("");
    } catch (err) { showToast(err.message, "error"); }
  }

  async function loadAppointments() {
    const list = document.getElementById("apptList");
    try {
      const appts = await listAppointmentsForPatient(profile.id);
      if (!appts.length) {
        list.innerHTML = `<div class="empty-state">${icon("appointments",40)}<p>No appointments yet.</p></div>`;
        return;
      }
      list.innerHTML = appts.map(a => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding: var(--space-3) 0; border-bottom: 1px solid var(--color-gray-100); gap: var(--space-3);">
          <div>
            <div style="font-weight:600; font-size: var(--fs-sm);">${new Date(a.scheduled_at).toLocaleString()}</div>
            <div class="text-muted" style="font-size: var(--fs-xs);">Dr. ${a.doctors?.profiles?.full_name || "Unassigned"} · ${a.reason || "—"}</div>
          </div>
          <div style="display:flex; align-items:center; gap: var(--space-2);">
            <span class="badge ${badgeClass(a.status)}">${a.status}</span>
            ${a.status === "pending" || a.status === "approved" ? `<button class="btn btn-sm btn-ghost cancel-btn" data-id="${a.id}">${icon("close",14)}</button>` : ""}
          </div>
        </div>
      `).join("");
      list.querySelectorAll(".cancel-btn").forEach(b => b.addEventListener("click", () => handleCancel(b.dataset.id)));
    } catch (err) {
      showToast(err.message, "error");
    }
  }

  function badgeClass(status) {
    return { pending: "badge-warning", approved: "badge-info", completed: "badge-success", cancelled: "badge-danger" }[status] || "badge-neutral";
  }

  async function handleCancel(id) {
    const ok = await confirmAction({ title: "Cancel this appointment?", confirmText: "Cancel appointment" });
    if (!ok) return;
    try { await cancelAppointment(id); showToast("Appointment cancelled.", "success"); await loadAppointments(); }
    catch (err) { showToast(err.message, "error"); }
  }
</script>
</body>
</html>
